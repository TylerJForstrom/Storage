name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests, lints, and crash-injection suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests (unit + fuzz + crash injection + end-to-end SQL)
        run: cargo test --workspace

      - name: WASM build
        run: cargo build -p glassdb-wasm --target wasm32-unknown-unknown --release
